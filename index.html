<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOC Visor</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00C2E0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NOC Visor" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Registrar Service Worker solo en web, no en APK -->
    <script>
      const isCapacitor = window.location.protocol === 'capacitor:' || 
                          window.location.protocol === 'ionic:' ||
                          (typeof window.Capacitor !== 'undefined' && window.Capacitor.isNativePlatform());
      
      if (!isCapacitor && 'serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/noc-sw.js')
            .then(reg => console.log('SW registrado:', reg))
            .catch(err => console.warn('SW error:', err));
        });
      }
    </script>
  </body>
</html>
